<!DOCTYPE html>
<html>
<head>

<title>Edit Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    background-image: url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?w=1600');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  }

  .container {
    background-color: rgba(255, 255, 255, 0.92);
    border-radius: 1rem;
    padding: 2rem;
    margin-top: 2rem;
    box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.2);
  }

  .card {
    border-radius: 1rem;
    border: none;
    box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.1);
  }

  h2 {
    font-weight: 600;
    color: #343a40;
  }

  label {
    font-weight: 500;
  }

  .form-control:focus, .form-select:focus {
    box-shadow: none;
    border-color: #0d6efd;
  }
</style>

</head>

<body>

<div class="container mt-5 col-lg-6 col-md-8 mx-auto">

  <h2 class="mb-4 text-center">Edit Job Application</h2>

  <div class="d-flex justify-content-center mb-4">
    <a href="/" class="btn btn-secondary btn-sm">Home</a>
  </div>

  <div class="card p-4">
    <form method="POST">
      {% csrf_token %}

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Company</label>
          {{ form.company }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Role</label>
          {{ form.role }}
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">Applied Date</label>
          {{ form.applied_date }}
        </div>
        <div class="col-md-6">
          <label class="form-label">Status</label>
          {{ form.status }}
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Notes</label>
        {{ form.notes }}
      </div>

      <div class="d-grid">
        <button class="btn btn-success btn-lg">Update</button>
      </div>

    </form>
  </div>

</div>

</body>
</html>
