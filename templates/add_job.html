<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Job Application</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-image: url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?w=1600');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .container {
        background-color: rgba(255, 255, 255, 0.92);
        border-radius: 1rem;
        padding: 2rem;
        margin-top: 2rem;
        box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.2);
      }

      .card {
        border-radius: 1rem;
        border: none;
        box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.1);
      }

      h2 {
        font-weight: 600;
        color: #343a40;
      }

      .btn-primary-custom {
        background-color: #0d6efd;
        color: #fff;
        font-weight: 500;
        border-radius: 0.5rem;
      }

      .btn-primary-custom:hover {
        background-color: #0b5ed7;
      }

      .form-control:focus {
        box-shadow: none;
        border-color: #0d6efd;
      }

      label {
        font-weight: 500;
      }

      .form-section {
        margin-bottom: 1rem;
      }
    </style>
  </head>

  <body>
    <div class="container mt-5">
      <h2 class="mb-4 text-center">Add Job Application</h2>

      <div class="d-flex justify-content-center mb-4">
        <a href="/" class="btn btn-secondary btn-sm">Home</a>
      </div>

      <div class="card p-4 col-lg-6 col-md-8 mx-auto">
        <form method="POST">
          {% csrf_token %}

          <div class="row g-3 form-section">
            <div class="col-md-6">
              <label for="company" class="form-label">Company</label>
              {{ form.company }}
            </div>
            <div class="col-md-6">
              <label for="role" class="form-label">Role</label>
              {{ form.role }}
            </div>
          </div>

          <div class="row g-3 form-section">
            <div class="col-md-6">
              <label for="applied_date" class="form-label">Applied Date</label>
              {{ form.applied_date }}
            </div>
            <div class="col-md-6">
              <label for="status" class="form-label">Status</label>
              {{ form.status }}
            </div>
          </div>

          <div class="form-section">
            <label for="notes" class="form-label">Notes</label>
            {{ form.notes }}
          </div>

          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary-custom btn-lg">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
